apiVersion: v1
kind: ConfigMap
metadata:
  name: billing-sql-scripts
data:
  # SQL to incrementally update usage and check quota
  # Returns tenants with their quota status
  update-and-check-quota.sql: |
    \set ON_ERROR_STOP on

    -- Step 1: Insert any new tenants found in ticks, credits, or token events.
    -- A token-only caller has no other row, so include it or its debit is dropped.
    INSERT INTO TenantQuota (tenant)
    SELECT DISTINCT tenant
    FROM (
      SELECT tenant FROM UsageTick WHERE processed_at IS NULL
      UNION
      SELECT tenant FROM TenantCreditHistory
      UNION
      SELECT caller_tenant FROM TokenUsageEvent WHERE processed_at IS NULL
    ) all_tenants
    ON CONFLICT (tenant) DO NOTHING;

    -- Step 2: Process unprocessed ticks and check quota (all in one atomic statement)
    -- Returns only tenants whose quota_exceeded flag changed in this run.
    WITH
    -- 1) Grab a batch of unprocessed ticks and lock them so other workers skip them
    batch AS (
      SELECT
        t.id,
        t.tenant,
        t.gpu_count,
        t.interval_ms,
        t.usage_type,
        t.tick_time
      FROM UsageTick t
      WHERE t.processed_at IS NULL
      ORDER BY t.id
      LIMIT 10000
      FOR UPDATE SKIP LOCKED
    ),

    -- 2) Resolve rate once per tick in this batch
    tick_with_rate AS (
      SELECT
        b.tenant,
        b.gpu_count,
        b.interval_ms,
        b.usage_type,
        GetBillingRateCents(b.usage_type, b.tick_time, b.tenant)::bigint AS rate_cents_per_hour
      FROM batch b
    ),

    -- 3) Aggregate exact billing numerators per tenant in this batch.
    -- Price each tick before aggregation so differing rates stay exact.
    agg AS (
      SELECT
        t.tenant,
        COALESCE(SUM(
          CASE WHEN t.usage_type != 'standby'
            THEN t.gpu_count::bigint
              * t.interval_ms::bigint
              * t.rate_cents_per_hour
            ELSE 0
          END
        ), 0)::bigint AS inference_batch_numer,
        COALESCE(SUM(
          CASE WHEN t.usage_type = 'standby'
            THEN t.gpu_count::bigint
              * t.interval_ms::bigint
              * t.rate_cents_per_hour
            ELSE 0
          END
        ), 0)::bigint AS standby_batch_numer
      FROM tick_with_rate t
      GROUP BY t.tenant
    ),

    -- 3t) Claim a batch of unprocessed token events that HAVE an active rate.
    -- Price lookup happens inline here so each claimed row evaluates
    -- GetTokenRateMicrocents(...) only once. No-rate rows are skipped (left
    -- unprocessed) so they self-heal once priced.
    token_batch AS (
      SELECT
        e.gateway_request_id,
        e.caller_tenant AS tenant,
        e.model_slug,
        e.prompt_tokens,
        e.completion_tokens,
        e.cached_tokens,
        e.ts,
        r.microcents_per_million_input,
        r.microcents_per_million_output,
        r.microcents_per_million_cached
      FROM TokenUsageEvent e
      CROSS JOIN LATERAL GetTokenRateMicrocents(e.model_slug, e.ts, e.caller_tenant) r
      WHERE e.processed_at IS NULL
      ORDER BY e.gateway_request_id
      LIMIT 10000
      FOR UPDATE SKIP LOCKED
    ),

    -- Billable input is prompt minus the cached subset; clamp at zero so a
    -- malformed upstream payload cannot produce a negative charge. A cached rate
    -- of 0 means "no cache discount": bill the full prompt at the input rate
    -- instead of carving out the cached subset (kept in sync with the live
    -- overlay in audit.rs ListTokenUsageHourly).
    token_with_rate AS (
      SELECT
        b.tenant,
        CASE
          WHEN b.microcents_per_million_cached = 0
            THEN b.prompt_tokens
          ELSE GREATEST(b.prompt_tokens - b.cached_tokens, 0::bigint)
        END AS input_tokens,
        b.cached_tokens,
        b.completion_tokens AS output_tokens,
        b.microcents_per_million_input,
        b.microcents_per_million_output,
        b.microcents_per_million_cached
      FROM token_batch b
    ),

    -- Exact token numerator per tenant (divide by 1_000_000_000_000 later, with carry).
    token_agg AS (
      SELECT
        t.tenant,
        COALESCE(SUM(
          t.input_tokens::numeric * t.microcents_per_million_input
          + t.cached_tokens::numeric * t.microcents_per_million_cached
          + t.output_tokens::numeric * t.microcents_per_million_output
        ), 0) AS token_batch_numer
      FROM token_with_rate t
      GROUP BY t.tenant
    ),

    -- Tenants touched by either usage type this run.
    affected AS (
      SELECT tenant FROM agg
      UNION
      SELECT tenant FROM token_agg
    ),

    -- 4) Snapshot old quota_exceeded for ONLY affected tenants
    old_state AS (
      SELECT
        q.tenant,
        q.quota_exceeded AS old_exceeded
      FROM TenantQuota q
      WHERE q.tenant IN (SELECT tenant FROM affected)
    ),

    -- 5) Sum credits per tenant (source of truth)
    credits AS (
      SELECT
        h.tenant,
        COALESCE(SUM(h.amount_cents), 0)::bigint AS total_credits
      FROM TenantCreditHistory h
      GROUP BY h.tenant
    ),

    -- 6) Apply carry-aware deltas for tenants touched in this run. GPU numerators
    -- divide by 3_600_000 (per-hour), token numerators by 1_000_000_000_000
    -- (microcents per million tokens).
    calc AS (
      SELECT
        q.tenant,
        q.threshold_cents,
        q.inference_used_cents,
        q.standby_used_cents,
        q.token_used_cents,
        q.inference_carry_numer,
        q.standby_carry_numer,
        q.token_carry_numer,
        COALESCE(a.inference_batch_numer, 0) AS inference_batch_numer,
        COALESCE(a.standby_batch_numer, 0) AS standby_batch_numer,
        COALESCE(tk.token_batch_numer, 0) AS token_batch_numer,
        (q.inference_carry_numer + COALESCE(a.inference_batch_numer, 0)) / 3600000 AS delta_inference_cents,
        (q.standby_carry_numer + COALESCE(a.standby_batch_numer, 0)) / 3600000 AS delta_standby_cents,
        TRUNC((q.token_carry_numer + COALESCE(tk.token_batch_numer, 0)) / 1000000000000)::bigint AS delta_token_cents,
        (q.inference_carry_numer + COALESCE(a.inference_batch_numer, 0)) % 3600000 AS next_inference_carry_numer,
        (q.standby_carry_numer + COALESCE(a.standby_batch_numer, 0)) % 3600000 AS next_standby_carry_numer,
        MOD(q.token_carry_numer + COALESCE(tk.token_batch_numer, 0), 1000000000000)::bigint AS next_token_carry_numer
      FROM TenantQuota q
      JOIN affected aff ON aff.tenant = q.tenant
      LEFT JOIN agg a ON a.tenant = q.tenant
      LEFT JOIN token_agg tk ON tk.tenant = q.tenant
    ),

    -- 7) Update usage split + balance + quota_exceeded for affected tenants.
    -- used_cents / balance / quota_exceeded include the token term alongside
    -- inference + standby, so token spend actually enforces quota.
    updated AS (
      UPDATE TenantQuota q
      SET
        inference_used_cents = c2.inference_used_cents + c2.delta_inference_cents,
        standby_used_cents = c2.standby_used_cents + c2.delta_standby_cents,
        token_used_cents = c2.token_used_cents + c2.delta_token_cents,
        used_cents =
          c2.inference_used_cents + c2.standby_used_cents + c2.token_used_cents
          + c2.delta_inference_cents + c2.delta_standby_cents + c2.delta_token_cents,
        inference_carry_numer = c2.next_inference_carry_numer,
        standby_carry_numer = c2.next_standby_carry_numer,
        token_carry_numer = c2.next_token_carry_numer,
        balance_cents = COALESCE(c.total_credits, 0) - (
          c2.inference_used_cents + c2.standby_used_cents + c2.token_used_cents
          + c2.delta_inference_cents + c2.delta_standby_cents + c2.delta_token_cents
        ),
        quota_exceeded =
          (
            COALESCE(c.total_credits, 0) - (
              c2.inference_used_cents + c2.standby_used_cents + c2.token_used_cents
              + c2.delta_inference_cents + c2.delta_standby_cents + c2.delta_token_cents
            )
          ) <= c2.threshold_cents
      FROM calc c2
      LEFT JOIN credits c ON c.tenant = c2.tenant
      WHERE q.tenant = c2.tenant
      RETURNING
        q.tenant,
        q.used_cents,
        q.balance_cents,
        q.quota_exceeded,
        COALESCE(c.total_credits, 0) AS credits_cents
    ),

    -- 8) Mark exactly the locked batch rows as processed (GPU ticks + token events)
    mark_processed AS (
      UPDATE UsageTick t
      SET processed_at = now()
      WHERE t.id IN (SELECT id FROM batch)
      RETURNING t.id
    ),
    mark_token_processed AS (
      UPDATE TokenUsageEvent e
      SET processed_at = now()
      WHERE e.gateway_request_id IN (SELECT gateway_request_id FROM token_batch)
      RETURNING e.gateway_request_id
    )

    -- 9) Return only tenants where quota_exceeded changed. The EXISTS forces both
    -- mark CTEs to run and suppresses output when nothing was processed.
    SELECT
      u.tenant,
      u.credits_cents,
      u.used_cents,
      u.balance_cents,
      CASE WHEN u.quota_exceeded THEN 'true' ELSE 'false' END AS quota_exceeded
    FROM updated u
    JOIN old_state o ON o.tenant = u.tenant
    WHERE u.quota_exceeded <> o.old_exceeded
      AND (
        EXISTS (SELECT 1 FROM mark_processed)
        OR EXISTS (SELECT 1 FROM mark_token_processed)
      );

  # Shell script to check quotas and update etcd via gateway API
  quota-check.sh: |
    #!/bin/sh
    set -eu

    GATEWAY_URL="${GATEWAY_URL:-http://gateway:4000}"
    API_KEY="${API_KEY:-}"
    TMPFILE="$(mktemp)"
    trap 'rm -f "${TMPFILE}"' EXIT INT TERM

    echo "Checking tenant quotas (incremental)..."

    # NOTE: this script does NOT self-migrate. Like the carry-column migration,
    # apply migrate-token-billing.sql once (job/runbook) before resuming this
    # suspended CronJob, so the token-referencing quota SQL always has its schema.

    # Update usage and quota_exceeded atomically in SQL, then sync only tenants
    # whose state changed in this batch.
    psql -v ON_ERROR_STOP=1 -q -t -A -F',' -f /scripts/update-and-check-quota.sql >"${TMPFILE}"
    while IFS=',' read -r tenant credits used balance quota_exceeded; do
      # Skip empty lines
      [ -z "$tenant" ] && continue

      echo "Tenant: $tenant, Credits: $credits cents, Used: $used cents, Balance: $balance cents, QuotaExceeded: $quota_exceeded"

      case "${quota_exceeded}" in
        true|false) ;;
        *)
          echo "Invalid quota_exceeded value '${quota_exceeded}' for ${tenant}, aborting sync" >&2
          exit 1
          ;;
      esac

      curl -sS -f -X POST "${GATEWAY_URL}/tenant/${tenant}/quota-exceeded" \
        -H "Content-Type: application/json" \
        -H "Authorization: Bearer ${API_KEY}" \
        -d "{\"quota_exceeded\": ${quota_exceeded}}"

      echo ""
    done <"${TMPFILE}"

    echo "Quota check completed."

  # One-shot full DB-to-gateway reconciliation for backfill completion or manual repair.
  sync-tenant-quota-exceeded.sh: |
    #!/bin/sh
    set -eu

    GATEWAY_URL="${GATEWAY_URL:-http://gateway:4000}"
    API_KEY="${API_KEY:-}"
    TMPFILE="$(mktemp)"
    trap 'rm -f "${TMPFILE}"' EXIT INT TERM

    psql -v ON_ERROR_STOP=1 -q -t -A -F',' -c "
      SELECT
        tenant,
        CASE WHEN COALESCE(quota_exceeded, false) THEN 'true' ELSE 'false' END AS quota_exceeded
      FROM TenantQuota
      ORDER BY tenant
    " >"${TMPFILE}"

    while IFS=',' read -r tenant quota_exceeded; do
      [ -z "$tenant" ] && continue

      case "${quota_exceeded}" in
        true|false) ;;
        *)
          echo "Invalid quota_exceeded value '${quota_exceeded}' for ${tenant}, aborting sync" >&2
          exit 1
          ;;
      esac

      curl -sS -f -X POST "${GATEWAY_URL}/tenant/${tenant}/quota-exceeded" \
        -H "Content-Type: application/json" \
        -H "Authorization: Bearer ${API_KEY}" \
        -d "{\"quota_exceeded\": ${quota_exceeded}}"
    done <"${TMPFILE}"

    echo "Tenant quota_exceeded sync completed."

  migrate-tenant-quota-carry.sql: |
    \set ON_ERROR_STOP on

    ALTER TABLE TenantQuota
      ADD COLUMN IF NOT EXISTS inference_carry_numer BIGINT NOT NULL DEFAULT 0,
      ADD COLUMN IF NOT EXISTS standby_carry_numer BIGINT NOT NULL DEFAULT 0;

  # Token-billing schema for existing DBs. Idempotent; applied by the billing jobs
  # before the token-referencing SQL runs.
  migrate-token-billing.sql: |
    \set ON_ERROR_STOP on

    ALTER TABLE TenantQuota
      ADD COLUMN IF NOT EXISTS token_used_cents  BIGINT NOT NULL DEFAULT 0,
      ADD COLUMN IF NOT EXISTS token_carry_numer BIGINT NOT NULL DEFAULT 0;

    CREATE TABLE IF NOT EXISTS TokenUsageEvent (
        gateway_request_id VARCHAR(128) PRIMARY KEY,
        client_request_id  VARCHAR(128),
        caller_tenant      VARCHAR NOT NULL,
        model_slug         VARCHAR NOT NULL,
        source             VARCHAR(16) NOT NULL,
        prompt_tokens      BIGINT NOT NULL DEFAULT 0,
        completion_tokens  BIGINT NOT NULL DEFAULT 0,
        cached_tokens      BIGINT NOT NULL DEFAULT 0,
        ts                 TIMESTAMPTZ NOT NULL,
        gateway_id         BIGINT,
        processed_at       TIMESTAMPTZ
    );

    CREATE INDEX IF NOT EXISTS idx_tokenevent_tenant      ON TokenUsageEvent(caller_tenant, ts);
    CREATE INDEX IF NOT EXISTS idx_tokenevent_model       ON TokenUsageEvent(model_slug, ts);
    CREATE INDEX IF NOT EXISTS idx_tokenevent_unprocessed ON TokenUsageEvent(ts) WHERE processed_at IS NULL;

    CREATE TABLE IF NOT EXISTS TokenRate (
        id                        SERIAL PRIMARY KEY,
        model_slug                VARCHAR,
        microcents_per_million_input   BIGINT NOT NULL,
        microcents_per_million_output  BIGINT NOT NULL,
        microcents_per_million_cached  BIGINT NOT NULL DEFAULT 0,
        effective_from            TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        effective_to              TIMESTAMPTZ,
        tenant                    VARCHAR,
        created_at                TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        added_by                  VARCHAR NOT NULL
    );

    ALTER TABLE TokenRate
      ADD COLUMN IF NOT EXISTS microcents_per_million_input BIGINT,
      ADD COLUMN IF NOT EXISTS microcents_per_million_output BIGINT,
      ADD COLUMN IF NOT EXISTS microcents_per_million_cached BIGINT;

    DO $$
    BEGIN
      IF EXISTS (
        SELECT 1
        FROM information_schema.columns
        WHERE table_name = 'tokenrate'
          AND column_name = 'cents_per_million_input'
      ) THEN
        EXECUTE $sql$
          UPDATE TokenRate
          SET
            microcents_per_million_input = COALESCE(microcents_per_million_input, cents_per_million_input * 1000000),
            microcents_per_million_output = COALESCE(microcents_per_million_output, cents_per_million_output * 1000000),
            microcents_per_million_cached = COALESCE(microcents_per_million_cached, cents_per_million_cached * 1000000)
          WHERE
            microcents_per_million_input IS NULL
            OR microcents_per_million_output IS NULL
            OR microcents_per_million_cached IS NULL
        $sql$;
      END IF;
    END $$;

    DO $$
    BEGIN
      IF EXISTS (
        SELECT 1
        FROM information_schema.columns
        WHERE table_name = 'tokenrate'
          AND column_name = 'cents_per_million_input'
      ) THEN
        EXECUTE $sql$
          ALTER TABLE TokenRate
            ALTER COLUMN cents_per_million_input SET DEFAULT 0,
            ALTER COLUMN cents_per_million_output SET DEFAULT 0,
            ALTER COLUMN cents_per_million_cached SET DEFAULT 0
        $sql$;
      END IF;
    END $$;

    ALTER TABLE TokenRate
      ALTER COLUMN microcents_per_million_input SET NOT NULL,
      ALTER COLUMN microcents_per_million_output SET NOT NULL,
      ALTER COLUMN microcents_per_million_cached SET NOT NULL,
      ALTER COLUMN microcents_per_million_cached SET DEFAULT 0;

    CREATE INDEX IF NOT EXISTS idx_tokenrate_lookup ON TokenRate(model_slug, effective_from);

    CREATE TABLE IF NOT EXISTS TokenUsageHourly (
        id                 SERIAL PRIMARY KEY,
        tenant             VARCHAR NOT NULL,
        model_slug         VARCHAR NOT NULL,
        hour               TIMESTAMPTZ NOT NULL,
        input_tokens       BIGINT NOT NULL DEFAULT 0,
        cached_tokens      BIGINT NOT NULL DEFAULT 0,
        output_tokens      BIGINT NOT NULL DEFAULT 0,
        request_count      BIGINT NOT NULL DEFAULT 0,
        input_numer        NUMERIC NOT NULL DEFAULT 0,
        output_numer       NUMERIC NOT NULL DEFAULT 0,
        cached_numer       NUMERIC NOT NULL DEFAULT 0,
        charge_cents       BIGINT NOT NULL DEFAULT 0,
        UNIQUE(tenant, model_slug, hour)
    );

    ALTER TABLE TokenUsageHourly
      ALTER COLUMN input_numer TYPE NUMERIC USING input_numer::numeric,
      ALTER COLUMN output_numer TYPE NUMERIC USING output_numer::numeric,
      ALTER COLUMN cached_numer TYPE NUMERIC USING cached_numer::numeric;

    CREATE INDEX IF NOT EXISTS idx_tokenhourly_tenant ON TokenUsageHourly(tenant, hour);

    CREATE OR REPLACE FUNCTION GetTokenRateMicrocents(
        p_model_slug VARCHAR,
        p_ts TIMESTAMPTZ,
        p_tenant VARCHAR
    ) RETURNS TABLE (
        microcents_per_million_input  BIGINT,
        microcents_per_million_output BIGINT,
        microcents_per_million_cached BIGINT
    )
    LANGUAGE SQL
    STABLE
    AS $$
        SELECT
            r.microcents_per_million_input,
            r.microcents_per_million_output,
            r.microcents_per_million_cached
        FROM TokenRate r
        WHERE (r.model_slug = p_model_slug OR r.model_slug IS NULL)
          AND (r.tenant     = p_tenant     OR r.tenant IS NULL)
          AND r.effective_from <= p_ts
          AND (r.effective_to IS NULL OR p_ts < r.effective_to)
        ORDER BY (r.tenant IS NOT NULL) DESC,
                 (r.model_slug IS NOT NULL) DESC,
                 r.effective_from DESC
        LIMIT 1;
    $$;

  backfill-tenant-quota-carry.sql: |
    \set ON_ERROR_STOP on

    BEGIN;

    -- Recompute TenantQuota exactly for all ticks strictly before :backfill_cutoff.
    -- Run only while billing-quota-check is suspended.
    WITH params AS (
      SELECT :'backfill_cutoff'::timestamptz AS cutoff
    ),
    target_tenants AS (
      SELECT tenant FROM TenantQuota
      UNION
      SELECT tenant FROM TenantCreditHistory
      UNION
      SELECT DISTINCT t.tenant
      FROM UsageTick t
      JOIN params p ON TRUE
      WHERE t.tick_time < p.cutoff
    )
    INSERT INTO TenantQuota (tenant)
    SELECT tenant
    FROM target_tenants
    ON CONFLICT (tenant) DO NOTHING;

    WITH params AS (
      SELECT :'backfill_cutoff'::timestamptz AS cutoff
    ),
    credits AS (
      SELECT
        h.tenant,
        COALESCE(SUM(h.amount_cents), 0)::bigint AS total_credits
      FROM TenantCreditHistory h
      GROUP BY h.tenant
    ),
    usage_totals AS (
      SELECT
        t.tenant,
        COALESCE(SUM(
          CASE WHEN t.usage_type != 'standby'
            THEN t.gpu_count::bigint
              * t.interval_ms::bigint
              * GetBillingRateCents(t.usage_type, t.tick_time, t.tenant)::bigint
            ELSE 0
          END
        ), 0)::bigint AS inference_numer,
        COALESCE(SUM(
          CASE WHEN t.usage_type = 'standby'
            THEN t.gpu_count::bigint
              * t.interval_ms::bigint
              * GetBillingRateCents(t.usage_type, t.tick_time, t.tenant)::bigint
            ELSE 0
          END
        ), 0)::bigint AS standby_numer
      FROM UsageTick t
      JOIN params p ON TRUE
      WHERE t.tick_time < p.cutoff
      GROUP BY t.tenant
    ),
    target_tenants AS (
      SELECT tenant FROM TenantQuota
      UNION
      SELECT tenant FROM TenantCreditHistory
      UNION
      SELECT tenant FROM usage_totals
    ),
    recomputed AS (
      SELECT
        tt.tenant,
        COALESCE(q.threshold_cents, 0)::bigint AS threshold_cents,
        COALESCE(c.total_credits, 0)::bigint AS total_credits,
        COALESCE(u.inference_numer, 0)::bigint AS inference_numer,
        COALESCE(u.standby_numer, 0)::bigint AS standby_numer,
        COALESCE(u.inference_numer, 0)::bigint / 3600000 AS inference_used_cents,
        COALESCE(u.standby_numer, 0)::bigint / 3600000 AS standby_used_cents,
        COALESCE(u.inference_numer, 0)::bigint % 3600000 AS inference_carry_numer,
        COALESCE(u.standby_numer, 0)::bigint % 3600000 AS standby_carry_numer
      FROM target_tenants tt
      LEFT JOIN TenantQuota q ON q.tenant = tt.tenant
      LEFT JOIN credits c ON c.tenant = tt.tenant
      LEFT JOIN usage_totals u ON u.tenant = tt.tenant
    ),
    updated AS (
      UPDATE TenantQuota q
      SET
        inference_used_cents = r.inference_used_cents,
        standby_used_cents = r.standby_used_cents,
        used_cents = r.inference_used_cents + r.standby_used_cents,
        inference_carry_numer = r.inference_carry_numer,
        standby_carry_numer = r.standby_carry_numer,
        balance_cents = r.total_credits - (r.inference_used_cents + r.standby_used_cents),
        quota_exceeded =
          (r.total_credits - (r.inference_used_cents + r.standby_used_cents)) <= r.threshold_cents
      FROM recomputed r
      WHERE q.tenant = r.tenant
      RETURNING q.tenant
    ),
    mark_processed AS (
      UPDATE UsageTick t
      SET processed_at = now()
      FROM params p
      WHERE t.processed_at IS NULL
        AND t.tick_time < p.cutoff
      RETURNING t.id
    )
    SELECT
      p.cutoff AS backfill_cutoff,
      (SELECT COUNT(*)::bigint FROM updated) AS updated_tenants,
      (SELECT COUNT(*)::bigint FROM mark_processed) AS marked_ticks
    FROM params p
    GROUP BY p.cutoff;

    COMMIT;

  verify-tenant-quota-carry.sql: |
    \set ON_ERROR_STOP on

    -- Immediate post-backfill check only.
    -- This compares TenantQuota to exact totals for tick_time < :backfill_cutoff.
    -- After billing-quota-check resumes and applies newer ticks, rerunning this
    -- script with the same cutoff will report mismatches by design.
    BEGIN;

    CREATE TEMP TABLE verify_tenant_quota_state ON COMMIT DROP AS
    WITH params AS (
      SELECT :'backfill_cutoff'::timestamptz AS cutoff
    ),
    credits AS (
      SELECT
        h.tenant,
        COALESCE(SUM(h.amount_cents), 0)::bigint AS total_credits
      FROM TenantCreditHistory h
      GROUP BY h.tenant
    ),
    usage_totals AS (
      SELECT
        t.tenant,
        COALESCE(SUM(
          CASE WHEN t.usage_type != 'standby'
            THEN t.gpu_count::bigint
              * t.interval_ms::bigint
              * GetBillingRateCents(t.usage_type, t.tick_time, t.tenant)::bigint
            ELSE 0
          END
        ), 0)::bigint AS inference_numer,
        COALESCE(SUM(
          CASE WHEN t.usage_type = 'standby'
            THEN t.gpu_count::bigint
              * t.interval_ms::bigint
              * GetBillingRateCents(t.usage_type, t.tick_time, t.tenant)::bigint
            ELSE 0
          END
        ), 0)::bigint AS standby_numer
      FROM UsageTick t
      JOIN params p ON TRUE
      WHERE t.tick_time < p.cutoff
      GROUP BY t.tenant
    ),
    expected AS (
      SELECT
        q.tenant,
        q.used_cents,
        q.inference_used_cents,
        q.standby_used_cents,
        q.token_used_cents,
        q.inference_carry_numer,
        q.standby_carry_numer,
        q.balance_cents,
        q.quota_exceeded,
        COALESCE(q.threshold_cents, 0)::bigint AS threshold_cents,
        COALESCE(c.total_credits, 0)::bigint AS total_credits,
        COALESCE(u.inference_numer, 0)::bigint / 3600000 AS expected_inference_used_cents,
        COALESCE(u.standby_numer, 0)::bigint / 3600000 AS expected_standby_used_cents,
        COALESCE(u.inference_numer, 0)::bigint % 3600000 AS expected_inference_carry_numer,
        COALESCE(u.standby_numer, 0)::bigint % 3600000 AS expected_standby_carry_numer
      FROM TenantQuota q
      LEFT JOIN credits c ON c.tenant = q.tenant
      LEFT JOIN usage_totals u ON u.tenant = q.tenant
    )
    SELECT
      e.*,
      -- token_used_cents is taken as the trusted stored value (these scripts verify
      -- GPU carry math and do not re-derive token spend), so used/balance/quota
      -- expectations include it and match the live values for token-billed tenants.
      e.expected_inference_used_cents + e.expected_standby_used_cents + e.token_used_cents AS expected_used_cents,
      e.total_credits - (e.expected_inference_used_cents + e.expected_standby_used_cents + e.token_used_cents) AS expected_balance_cents,
      (
        e.total_credits - (e.expected_inference_used_cents + e.expected_standby_used_cents + e.token_used_cents)
      ) <= e.threshold_cents AS expected_quota_exceeded,
      e.used_cents IS DISTINCT FROM (e.inference_used_cents + e.standby_used_cents + e.token_used_cents) AS split_mismatch,
      e.inference_carry_numer < 0
        OR e.inference_carry_numer >= 3600000
        OR e.standby_carry_numer < 0
        OR e.standby_carry_numer >= 3600000 AS carry_range_mismatch,
      e.inference_used_cents IS DISTINCT FROM e.expected_inference_used_cents
        OR e.standby_used_cents IS DISTINCT FROM e.expected_standby_used_cents
        OR e.inference_carry_numer IS DISTINCT FROM e.expected_inference_carry_numer
        OR e.standby_carry_numer IS DISTINCT FROM e.expected_standby_carry_numer AS exact_usage_mismatch,
      e.balance_cents IS DISTINCT FROM (
        e.total_credits - (e.expected_inference_used_cents + e.expected_standby_used_cents + e.token_used_cents)
      ) AS balance_mismatch,
      e.quota_exceeded IS DISTINCT FROM (
        (e.total_credits - (e.expected_inference_used_cents + e.expected_standby_used_cents + e.token_used_cents))
        <= e.threshold_cents
      ) AS quota_exceeded_mismatch
    FROM expected e;

    SELECT
      tenant,
      used_cents,
      expected_used_cents,
      inference_used_cents,
      expected_inference_used_cents,
      standby_used_cents,
      expected_standby_used_cents,
      inference_carry_numer,
      expected_inference_carry_numer,
      standby_carry_numer,
      expected_standby_carry_numer,
      balance_cents,
      expected_balance_cents,
      quota_exceeded,
      expected_quota_exceeded,
      threshold_cents,
      total_credits
    FROM verify_tenant_quota_state
    WHERE split_mismatch
       OR carry_range_mismatch
       OR exact_usage_mismatch
       OR balance_mismatch
       OR quota_exceeded_mismatch
    ORDER BY tenant
    LIMIT 50;

    CREATE TEMP TABLE verify_tenant_quota_counts ON COMMIT DROP AS
    SELECT
      COUNT(*) FILTER (WHERE split_mismatch) AS split_mismatch_count,
      COUNT(*) FILTER (WHERE carry_range_mismatch) AS carry_range_count,
      COUNT(*) FILTER (WHERE exact_usage_mismatch) AS exact_usage_mismatch_count,
      COUNT(*) FILTER (WHERE balance_mismatch) AS balance_mismatch_count,
      COUNT(*) FILTER (WHERE quota_exceeded_mismatch) AS quota_exceeded_mismatch_count
    FROM verify_tenant_quota_state;

    SELECT
      split_mismatch_count,
      carry_range_count,
      exact_usage_mismatch_count,
      balance_mismatch_count,
      quota_exceeded_mismatch_count
    FROM verify_tenant_quota_counts;

    SELECT 1 / CASE
      WHEN split_mismatch_count
         + carry_range_count
         + exact_usage_mismatch_count
         + balance_mismatch_count
         + quota_exceeded_mismatch_count = 0 THEN 1
      ELSE 0
    END AS verification_passed
    FROM verify_tenant_quota_counts;

    COMMIT;

  verify-tenant-quota-live.sql: |
    \set ON_ERROR_STOP on

    -- Live post-resume verification.
    -- This compares current TenantQuota to exact totals derived from already
    -- processed UsageTick rows. Unprocessed ticks are intentionally excluded so
    -- the check can run safely between quota-check executions without false
    -- mismatches from newly arrived but not-yet-billed usage.
    BEGIN;

    CREATE TEMP TABLE verify_tenant_quota_live_state ON COMMIT DROP AS
    WITH credits AS (
      SELECT
        h.tenant,
        COALESCE(SUM(h.amount_cents), 0)::bigint AS total_credits
      FROM TenantCreditHistory h
      GROUP BY h.tenant
    ),
    usage_totals AS (
      SELECT
        t.tenant,
        COALESCE(SUM(
          CASE WHEN t.usage_type != 'standby'
            THEN t.gpu_count::bigint
              * t.interval_ms::bigint
              * GetBillingRateCents(t.usage_type, t.tick_time, t.tenant)::bigint
            ELSE 0
          END
        ), 0)::bigint AS inference_numer,
        COALESCE(SUM(
          CASE WHEN t.usage_type = 'standby'
            THEN t.gpu_count::bigint
              * t.interval_ms::bigint
              * GetBillingRateCents(t.usage_type, t.tick_time, t.tenant)::bigint
            ELSE 0
          END
        ), 0)::bigint AS standby_numer
      FROM UsageTick t
      WHERE t.processed_at IS NOT NULL
      GROUP BY t.tenant
    ),
    expected AS (
      SELECT
        q.tenant,
        q.used_cents,
        q.inference_used_cents,
        q.standby_used_cents,
        q.token_used_cents,
        q.inference_carry_numer,
        q.standby_carry_numer,
        q.balance_cents,
        q.quota_exceeded,
        COALESCE(q.threshold_cents, 0)::bigint AS threshold_cents,
        COALESCE(c.total_credits, 0)::bigint AS total_credits,
        COALESCE(u.inference_numer, 0)::bigint / 3600000 AS expected_inference_used_cents,
        COALESCE(u.standby_numer, 0)::bigint / 3600000 AS expected_standby_used_cents,
        COALESCE(u.inference_numer, 0)::bigint % 3600000 AS expected_inference_carry_numer,
        COALESCE(u.standby_numer, 0)::bigint % 3600000 AS expected_standby_carry_numer
      FROM TenantQuota q
      LEFT JOIN credits c ON c.tenant = q.tenant
      LEFT JOIN usage_totals u ON u.tenant = q.tenant
    )
    SELECT
      e.*,
      -- token_used_cents is taken as the trusted stored value (these scripts verify
      -- GPU carry math and do not re-derive token spend), so used/balance/quota
      -- expectations include it and match the live values for token-billed tenants.
      e.expected_inference_used_cents + e.expected_standby_used_cents + e.token_used_cents AS expected_used_cents,
      e.total_credits - (e.expected_inference_used_cents + e.expected_standby_used_cents + e.token_used_cents) AS expected_balance_cents,
      (
        e.total_credits - (e.expected_inference_used_cents + e.expected_standby_used_cents + e.token_used_cents)
      ) <= e.threshold_cents AS expected_quota_exceeded,
      e.used_cents IS DISTINCT FROM (e.inference_used_cents + e.standby_used_cents + e.token_used_cents) AS split_mismatch,
      e.inference_carry_numer < 0
        OR e.inference_carry_numer >= 3600000
        OR e.standby_carry_numer < 0
        OR e.standby_carry_numer >= 3600000 AS carry_range_mismatch,
      e.inference_used_cents IS DISTINCT FROM e.expected_inference_used_cents
        OR e.standby_used_cents IS DISTINCT FROM e.expected_standby_used_cents
        OR e.inference_carry_numer IS DISTINCT FROM e.expected_inference_carry_numer
        OR e.standby_carry_numer IS DISTINCT FROM e.expected_standby_carry_numer AS exact_usage_mismatch,
      e.balance_cents IS DISTINCT FROM (
        e.total_credits - (e.expected_inference_used_cents + e.expected_standby_used_cents + e.token_used_cents)
      ) AS balance_mismatch,
      e.quota_exceeded IS DISTINCT FROM (
        (e.total_credits - (e.expected_inference_used_cents + e.expected_standby_used_cents + e.token_used_cents))
        <= e.threshold_cents
      ) AS quota_exceeded_mismatch
    FROM expected e;

    SELECT
      tenant,
      used_cents,
      expected_used_cents,
      inference_used_cents,
      expected_inference_used_cents,
      standby_used_cents,
      expected_standby_used_cents,
      inference_carry_numer,
      expected_inference_carry_numer,
      standby_carry_numer,
      expected_standby_carry_numer,
      balance_cents,
      expected_balance_cents,
      quota_exceeded,
      expected_quota_exceeded,
      threshold_cents,
      total_credits
    FROM verify_tenant_quota_live_state
    WHERE split_mismatch
       OR carry_range_mismatch
       OR exact_usage_mismatch
       OR balance_mismatch
       OR quota_exceeded_mismatch
    ORDER BY tenant
    LIMIT 50;

    CREATE TEMP TABLE verify_tenant_quota_live_counts ON COMMIT DROP AS
    SELECT
      COUNT(*) FILTER (WHERE split_mismatch) AS split_mismatch_count,
      COUNT(*) FILTER (WHERE carry_range_mismatch) AS carry_range_count,
      COUNT(*) FILTER (WHERE exact_usage_mismatch) AS exact_usage_mismatch_count,
      COUNT(*) FILTER (WHERE balance_mismatch) AS balance_mismatch_count,
      COUNT(*) FILTER (WHERE quota_exceeded_mismatch) AS quota_exceeded_mismatch_count
    FROM verify_tenant_quota_live_state;

    SELECT
      split_mismatch_count,
      carry_range_count,
      exact_usage_mismatch_count,
      balance_mismatch_count,
      quota_exceeded_mismatch_count
    FROM verify_tenant_quota_live_counts;

    SELECT 1 / CASE
      WHEN split_mismatch_count
         + carry_range_count
         + exact_usage_mismatch_count
         + balance_mismatch_count
         + quota_exceeded_mismatch_count = 0 THEN 1
      ELSE 0
    END AS verification_passed
    FROM verify_tenant_quota_live_counts;

    COMMIT;

  migrate-usage-hourly-by-func-numer.sql: |
    \set ON_ERROR_STOP on

    ALTER TABLE UsageHourlyByFunc
      ADD COLUMN IF NOT EXISTS inference_numer BIGINT NOT NULL DEFAULT 0,
      ADD COLUMN IF NOT EXISTS standby_numer BIGINT NOT NULL DEFAULT 0;

  verify-usage-hourly-by-func-numer.sql: |
    \set ON_ERROR_STOP on

    -- Verification recomputes expected hourly rows from UsageTick for the
    -- selected range and checks both completeness and exact values.
    -- If UsageTick retention has already deleted source ticks for some hours in
    -- this range, those rows cannot be exactly backfilled from current data and
    -- may appear as mismatches because the old cent fields remain populated while
    -- the new numerator fields stayed at migration defaults.
    -- In that case, shorten the backfill range to the retained tick window or
    -- restore the missing UsageTick rows from backup before running verification.

    BEGIN;

    CREATE TEMP TABLE verify_usage_hourly_by_func_state ON COMMIT DROP AS
    WITH params AS (
      SELECT
        date_trunc('hour', :'start_hour'::timestamptz) AS start_hour,
        date_trunc('hour', :'end_hour'::timestamptz) AS end_hour
    ),
    expected AS (
      SELECT
        t.tenant,
        t.namespace,
        t.funcname,
        t.fprevision,
        date_trunc('hour', t.tick_time) AS hour,
        COALESCE(SUM(
          CASE WHEN t.usage_type != 'standby'
            THEN t.gpu_count::bigint
              * t.interval_ms::bigint
              * GetBillingRateCents(t.usage_type, t.tick_time, t.tenant)::bigint
            ELSE 0
          END
        ), 0)::bigint AS expected_inference_numer,
        COALESCE(SUM(
          CASE WHEN t.usage_type = 'standby'
            THEN t.gpu_count::bigint
              * t.interval_ms::bigint
              * GetBillingRateCents(t.usage_type, t.tick_time, t.tenant)::bigint
            ELSE 0
          END
        ), 0)::bigint AS expected_standby_numer,
        SUM(CASE WHEN t.usage_type != 'standby'
          THEN t.interval_ms::bigint * t.gpu_count::bigint ELSE 0 END)::bigint AS expected_inference_ms,
        SUM(CASE WHEN t.usage_type = 'standby'
          THEN t.interval_ms::bigint * t.gpu_count::bigint ELSE 0 END)::bigint AS expected_standby_ms
      FROM UsageTick t
      JOIN params p ON TRUE
      WHERE t.tick_time >= p.start_hour
        AND t.tick_time < p.end_hour
      GROUP BY t.tenant, t.namespace, t.funcname, t.fprevision, date_trunc('hour', t.tick_time)
    ),
    actual AS (
      SELECT
        h.tenant,
        h.namespace,
        h.funcname,
        h.fprevision,
        h.hour,
        h.charge_cents,
        h.inference_cents,
        h.standby_cents,
        h.inference_numer,
        h.standby_numer,
        h.inference_ms,
        h.standby_ms
      FROM UsageHourlyByFunc h
      JOIN params p ON TRUE
      WHERE h.hour >= p.start_hour
        AND h.hour < p.end_hour
    )
    SELECT
      COALESCE(a.tenant, e.tenant) AS tenant,
      COALESCE(a.namespace, e.namespace) AS namespace,
      COALESCE(a.funcname, e.funcname) AS funcname,
      COALESCE(a.fprevision, e.fprevision) AS fprevision,
      COALESCE(a.hour, e.hour) AS hour,
      a.charge_cents,
      a.inference_cents,
      a.standby_cents,
      a.inference_numer,
      a.standby_numer,
      a.inference_ms,
      a.standby_ms,
      e.expected_inference_numer,
      e.expected_standby_numer,
      e.expected_inference_ms,
      e.expected_standby_ms,
      a.tenant IS NULL AS missing_actual_row,
      e.tenant IS NULL AS unexpected_actual_row,
      a.inference_cents IS DISTINCT FROM a.inference_numer / 3600000 AS inference_cents_self_mismatch,
      a.standby_cents IS DISTINCT FROM a.standby_numer / 3600000 AS standby_cents_self_mismatch,
      a.charge_cents IS DISTINCT FROM (a.inference_numer + a.standby_numer) / 3600000 AS charge_cents_self_mismatch,
      a.inference_numer IS DISTINCT FROM e.expected_inference_numer AS inference_numer_mismatch,
      a.standby_numer IS DISTINCT FROM e.expected_standby_numer AS standby_numer_mismatch,
      a.inference_ms IS DISTINCT FROM e.expected_inference_ms AS inference_ms_mismatch,
      a.standby_ms IS DISTINCT FROM e.expected_standby_ms AS standby_ms_mismatch
    FROM actual a
    FULL OUTER JOIN expected e
      ON e.tenant = a.tenant
     AND e.namespace = a.namespace
     AND e.funcname = a.funcname
     AND e.fprevision = a.fprevision
     AND e.hour = a.hour
    WHERE a.tenant IS NULL
       OR e.tenant IS NULL
       OR a.inference_cents IS DISTINCT FROM a.inference_numer / 3600000
       OR a.standby_cents IS DISTINCT FROM a.standby_numer / 3600000
       OR a.charge_cents IS DISTINCT FROM (a.inference_numer + a.standby_numer) / 3600000
       OR a.inference_numer IS DISTINCT FROM e.expected_inference_numer
       OR a.standby_numer IS DISTINCT FROM e.expected_standby_numer
       OR a.inference_ms IS DISTINCT FROM e.expected_inference_ms
       OR a.standby_ms IS DISTINCT FROM e.expected_standby_ms;

    SELECT *
    FROM verify_usage_hourly_by_func_state
    ORDER BY tenant, namespace, funcname, fprevision, hour
    LIMIT 50;

    CREATE TEMP TABLE verify_usage_hourly_by_func_counts ON COMMIT DROP AS
    SELECT
      COUNT(*) FILTER (WHERE missing_actual_row) AS missing_actual_row_count,
      COUNT(*) FILTER (WHERE unexpected_actual_row) AS unexpected_actual_row_count,
      COUNT(*) FILTER (
        WHERE inference_cents_self_mismatch
           OR standby_cents_self_mismatch
           OR charge_cents_self_mismatch
      ) AS cent_self_mismatch_count,
      COUNT(*) FILTER (
        WHERE inference_numer_mismatch
           OR standby_numer_mismatch
           OR inference_ms_mismatch
           OR standby_ms_mismatch
      ) AS exact_value_mismatch_count
    FROM verify_usage_hourly_by_func_state;

    SELECT
      missing_actual_row_count,
      unexpected_actual_row_count,
      cent_self_mismatch_count,
      exact_value_mismatch_count
    FROM verify_usage_hourly_by_func_counts;

    SELECT 1 / CASE
      WHEN missing_actual_row_count
         + unexpected_actual_row_count
         + cent_self_mismatch_count
         + exact_value_mismatch_count = 0 THEN 1
      ELSE 0
    END AS verification_passed
    FROM verify_usage_hourly_by_func_counts;

    COMMIT;

  # -- Old hourly-aggregate.sql targeting UsageHourly (kept for reference):
  # -- INSERT INTO UsageHourly (tenant, hour, ...) SELECT ... FROM UsageTick
  # -- GROUP BY tenant, hour ON CONFLICT (tenant, hour) DO UPDATE SET ...

  hourly-aggregate.sql: |
    \set ON_ERROR_STOP on

    -- Aggregate ticks from the last 3 hours into UsageHourlyByFunc
    -- Uses a 3-hour window for self-healing: if a cron run is missed,
    -- the next run will fill in the gap. ON CONFLICT makes this idempotent.
    WITH tick_with_rate AS (
      SELECT
        t.tenant,
        t.namespace,
        t.funcname,
        t.fprevision,
        date_trunc('hour', t.tick_time) AS hour,
        t.interval_ms::bigint AS interval_ms,
        t.gpu_count::bigint AS gpu_count,
        t.usage_type,
        GetBillingRateCents(t.usage_type, t.tick_time, t.tenant)::bigint AS rate_cents_per_hour
      FROM UsageTick t
      WHERE t.tick_time >= date_trunc('hour', NOW() - INTERVAL '3 hours')
        AND t.tick_time < date_trunc('hour', NOW())
    ),
    hourly AS (
      SELECT
        t.tenant,
        t.namespace,
        t.funcname,
        t.fprevision,
        t.hour,
        COALESCE(SUM(
          CASE WHEN t.usage_type != 'standby'
            THEN t.gpu_count * t.interval_ms * t.rate_cents_per_hour
            ELSE 0
          END
        ), 0)::bigint AS inference_numer,
        COALESCE(SUM(
          CASE WHEN t.usage_type = 'standby'
            THEN t.gpu_count * t.interval_ms * t.rate_cents_per_hour
            ELSE 0
          END
        ), 0)::bigint AS standby_numer,
        SUM(CASE WHEN t.usage_type != 'standby'
          THEN t.interval_ms * t.gpu_count ELSE 0 END)::bigint AS inference_ms,
        SUM(CASE WHEN t.usage_type = 'standby'
          THEN t.interval_ms * t.gpu_count ELSE 0 END)::bigint AS standby_ms
      FROM tick_with_rate t
      GROUP BY t.tenant, t.namespace, t.funcname, t.fprevision, t.hour
    )
    INSERT INTO UsageHourlyByFunc
      (tenant, namespace, funcname, fprevision, hour,
       charge_cents, inference_cents, standby_cents,
       inference_numer, standby_numer, inference_ms, standby_ms)
    SELECT
      h.tenant,
      h.namespace,
      h.funcname,
      h.fprevision,
      h.hour,
      (h.inference_numer + h.standby_numer) / 3600000,
      h.inference_numer / 3600000,
      h.standby_numer / 3600000,
      h.inference_numer,
      h.standby_numer,
      h.inference_ms,
      h.standby_ms
    FROM hourly h
    ON CONFLICT (tenant, namespace, funcname, fprevision, hour)
    DO UPDATE SET
      charge_cents = EXCLUDED.charge_cents,
      inference_cents = EXCLUDED.inference_cents,
      standby_cents = EXCLUDED.standby_cents,
      inference_numer = EXCLUDED.inference_numer,
      standby_numer = EXCLUDED.standby_numer,
      inference_ms = EXCLUDED.inference_ms,
      standby_ms = EXCLUDED.standby_ms;

  # -- Old hourly-aggregate-range.sql targeting UsageHourly (commented out):
  # hourly-aggregate-range.sql: |
  #   -- Backfill UsageHourly for a custom [start_hour, end_hour) UTC range.
  #   -- psql -v start_hour='...' -v end_hour='...' -f /scripts/hourly-aggregate-range.sql
  #   WITH params AS (
  #     SELECT date_trunc('hour', :'start_hour'::timestamptz) AS start_hour,
  #            date_trunc('hour', :'end_hour'::timestamptz) AS end_hour
  #   ), tick_with_rate AS (
  #     SELECT t.tenant, t.tick_time, t.interval_ms, t.gpu_count, t.usage_type,
  #            GetBillingRateCents(t.usage_type, t.tick_time, t.tenant)::numeric AS rate_cents_per_hour
  #     FROM UsageTick t JOIN params p ON TRUE
  #     WHERE t.tick_time >= p.start_hour AND t.tick_time < p.end_hour
  #   )
  #   INSERT INTO UsageHourly (tenant, hour, charge_cents, inference_cents, standby_cents, inference_ms, standby_ms)
  #   SELECT t.tenant, date_trunc('hour', t.tick_time), ...
  #   GROUP BY t.tenant, date_trunc('hour', t.tick_time)
  #   ON CONFLICT (tenant, hour) DO UPDATE SET ...

  hourly-aggregate-by-func-range.sql: |
    \set ON_ERROR_STOP on

    -- Backfill UsageHourlyByFunc for a custom [start_hour, end_hour) UTC range.
    -- Example:
    -- psql -v start_hour='2026-02-01T00:00:00Z' -v end_hour='2026-02-09T00:00:00Z' -f /scripts/hourly-aggregate-by-func-range.sql
    -- Uses the same billing-rate lookup + upsert logic as hourly-aggregate.sql.
    WITH
    params AS (
      SELECT
        date_trunc('hour', :'start_hour'::timestamptz) AS start_hour,
        date_trunc('hour', :'end_hour'::timestamptz) AS end_hour
    ),
    tick_with_rate AS (
      SELECT
        t.tenant,
        t.namespace,
        t.funcname,
        t.fprevision,
        date_trunc('hour', t.tick_time) AS hour,
        t.interval_ms::bigint AS interval_ms,
        t.gpu_count::bigint AS gpu_count,
        t.usage_type,
        GetBillingRateCents(t.usage_type, t.tick_time, t.tenant)::bigint AS rate_cents_per_hour
      FROM UsageTick t
      JOIN params p ON TRUE
      WHERE t.tick_time >= p.start_hour
        AND t.tick_time < p.end_hour
    ),
    hourly AS (
      SELECT
        t.tenant,
        t.namespace,
        t.funcname,
        t.fprevision,
        t.hour,
        COALESCE(SUM(
          CASE WHEN t.usage_type != 'standby'
            THEN t.gpu_count * t.interval_ms * t.rate_cents_per_hour
            ELSE 0
          END
        ), 0)::bigint AS inference_numer,
        COALESCE(SUM(
          CASE WHEN t.usage_type = 'standby'
            THEN t.gpu_count * t.interval_ms * t.rate_cents_per_hour
            ELSE 0
          END
        ), 0)::bigint AS standby_numer,
        SUM(CASE WHEN t.usage_type != 'standby'
          THEN t.interval_ms * t.gpu_count ELSE 0 END)::bigint AS inference_ms,
        SUM(CASE WHEN t.usage_type = 'standby'
          THEN t.interval_ms * t.gpu_count ELSE 0 END)::bigint AS standby_ms
      FROM tick_with_rate t
      GROUP BY t.tenant, t.namespace, t.funcname, t.fprevision, t.hour
    ),
    upserted AS (
      INSERT INTO UsageHourlyByFunc
        (tenant, namespace, funcname, fprevision, hour,
         charge_cents, inference_cents, standby_cents,
         inference_numer, standby_numer, inference_ms, standby_ms)
      SELECT
        h.tenant,
        h.namespace,
        h.funcname,
        h.fprevision,
        h.hour,
        (h.inference_numer + h.standby_numer) / 3600000,
        h.inference_numer / 3600000,
        h.standby_numer / 3600000,
        h.inference_numer,
        h.standby_numer,
        h.inference_ms,
        h.standby_ms
      FROM hourly h
      ON CONFLICT (tenant, namespace, funcname, fprevision, hour)
      DO UPDATE SET
        charge_cents = EXCLUDED.charge_cents,
        inference_cents = EXCLUDED.inference_cents,
        standby_cents = EXCLUDED.standby_cents,
        inference_numer = EXCLUDED.inference_numer,
        standby_numer = EXCLUDED.standby_numer,
        inference_ms = EXCLUDED.inference_ms,
        standby_ms = EXCLUDED.standby_ms
      RETURNING tenant, hour
    )
    SELECT
      p.start_hour,
      p.end_hour,
      COUNT(u.hour)::bigint AS upserted_rows
    FROM params p
    LEFT JOIN upserted u ON TRUE
    GROUP BY p.start_hour, p.end_hour;

  # Pass 2 for token billing: hourly reporting rollup. Reads raw TokenUsageEvent
  # and recomputes from GetTokenRateMicrocents itself (does NOT read the debit output).
  # 3-hour self-healing window on ts; REPLACE-on-conflict makes overlap idempotent.
  # No-rate events yield no rate row and are simply absent until priced.
  token-hourly-aggregate.sql: |
    \set ON_ERROR_STOP on

    WITH event_with_rate AS (
      SELECT
        e.caller_tenant AS tenant,
        e.model_slug,
        date_trunc('hour', e.ts) AS hour,
        -- Usage truth: raw prompt tokens, independent of pricing. Stored in
        -- input_tokens (see docs/token-usage-hourly-prompt-token-proposal.md).
        e.prompt_tokens AS prompt_input_tokens,
        -- Billing basis: a cached rate of 0 means "no cache discount", so bill
        -- the full prompt at the input rate; otherwise carve out the cached
        -- subset (kept in sync with the live overlay in audit.rs
        -- ListTokenUsageHourly and the pass-1 debit rollup above).
        CASE
          WHEN r.microcents_per_million_cached = 0
            THEN e.prompt_tokens
          ELSE GREATEST(e.prompt_tokens - e.cached_tokens, 0::bigint)
        END AS billable_input_tokens,
        e.cached_tokens,
        e.completion_tokens AS output_tokens,
        r.microcents_per_million_input,
        r.microcents_per_million_output,
        r.microcents_per_million_cached
      FROM TokenUsageEvent e
      CROSS JOIN LATERAL GetTokenRateMicrocents(e.model_slug, e.ts, e.caller_tenant) r
      WHERE e.ts >= date_trunc('hour', NOW() - INTERVAL '3 hours')
        AND e.ts < date_trunc('hour', NOW())
    ),
    hourly AS (
      SELECT
        t.tenant,
        t.model_slug,
        t.hour,
        SUM(t.prompt_input_tokens)::bigint AS input_tokens,
        SUM(t.cached_tokens)::bigint AS cached_tokens,
        SUM(t.output_tokens)::bigint AS output_tokens,
        COUNT(*)::bigint AS request_count,
        COALESCE(SUM(t.billable_input_tokens::numeric * t.microcents_per_million_input), 0) AS input_numer,
        COALESCE(SUM(t.output_tokens::numeric * t.microcents_per_million_output), 0) AS output_numer,
        COALESCE(SUM(t.cached_tokens::numeric * t.microcents_per_million_cached), 0) AS cached_numer
      FROM event_with_rate t
      GROUP BY t.tenant, t.model_slug, t.hour
    )
    INSERT INTO TokenUsageHourly
      (tenant, model_slug, hour, input_tokens, cached_tokens, output_tokens,
       request_count, input_numer, output_numer, cached_numer, charge_cents)
    SELECT
      h.tenant,
      h.model_slug,
      h.hour,
      h.input_tokens,
      h.cached_tokens,
      h.output_tokens,
      h.request_count,
      h.input_numer,
      h.output_numer,
      h.cached_numer,
      TRUNC((h.input_numer + h.output_numer + h.cached_numer) / 1000000000000)::bigint
    FROM hourly h
    ON CONFLICT (tenant, model_slug, hour)
    DO UPDATE SET
      input_tokens = EXCLUDED.input_tokens,
      cached_tokens = EXCLUDED.cached_tokens,
      output_tokens = EXCLUDED.output_tokens,
      request_count = EXCLUDED.request_count,
      input_numer = EXCLUDED.input_numer,
      output_numer = EXCLUDED.output_numer,
      cached_numer = EXCLUDED.cached_numer,
      charge_cents = EXCLUDED.charge_cents;

  token-hourly-aggregate-range.sql: |
    \set ON_ERROR_STOP on

    -- Backfill TokenUsageHourly for a custom [start_hour, end_hour) UTC range.
    -- Example:
    -- psql -v start_hour='2026-02-01T00:00:00Z' -v end_hour='2026-02-09T00:00:00Z' -f /scripts/token-hourly-aggregate-range.sql
    -- Uses the same token-rate lookup + upsert logic as token-hourly-aggregate.sql.
    WITH
    params AS (
      SELECT
        date_trunc('hour', :'start_hour'::timestamptz) AS start_hour,
        date_trunc('hour', :'end_hour'::timestamptz) AS end_hour
    ),
    event_with_rate AS (
      SELECT
        e.caller_tenant AS tenant,
        e.model_slug,
        date_trunc('hour', e.ts) AS hour,
        -- Usage truth: raw prompt tokens, independent of pricing. Stored in
        -- input_tokens (see docs/token-usage-hourly-prompt-token-proposal.md).
        e.prompt_tokens AS prompt_input_tokens,
        -- Billing basis: a cached rate of 0 means "no cache discount", so bill
        -- the full prompt at the input rate; otherwise carve out the cached
        -- subset (kept in sync with token-hourly-aggregate.sql and the live
        -- overlay in audit.rs ListTokenUsageHourly).
        CASE
          WHEN r.microcents_per_million_cached = 0
            THEN e.prompt_tokens
          ELSE GREATEST(e.prompt_tokens - e.cached_tokens, 0::bigint)
        END AS billable_input_tokens,
        e.cached_tokens,
        e.completion_tokens AS output_tokens,
        r.microcents_per_million_input,
        r.microcents_per_million_output,
        r.microcents_per_million_cached
      FROM TokenUsageEvent e
      JOIN params p ON TRUE
      CROSS JOIN LATERAL GetTokenRateMicrocents(e.model_slug, e.ts, e.caller_tenant) r
      WHERE e.ts >= p.start_hour
        AND e.ts < p.end_hour
    ),
    hourly AS (
      SELECT
        t.tenant,
        t.model_slug,
        t.hour,
        SUM(t.prompt_input_tokens)::bigint AS input_tokens,
        SUM(t.cached_tokens)::bigint AS cached_tokens,
        SUM(t.output_tokens)::bigint AS output_tokens,
        COUNT(*)::bigint AS request_count,
        COALESCE(SUM(t.billable_input_tokens::numeric * t.microcents_per_million_input), 0) AS input_numer,
        COALESCE(SUM(t.output_tokens::numeric * t.microcents_per_million_output), 0) AS output_numer,
        COALESCE(SUM(t.cached_tokens::numeric * t.microcents_per_million_cached), 0) AS cached_numer
      FROM event_with_rate t
      GROUP BY t.tenant, t.model_slug, t.hour
    ),
    upserted AS (
      INSERT INTO TokenUsageHourly
        (tenant, model_slug, hour, input_tokens, cached_tokens, output_tokens,
         request_count, input_numer, output_numer, cached_numer, charge_cents)
      SELECT
        h.tenant,
        h.model_slug,
        h.hour,
        h.input_tokens,
        h.cached_tokens,
        h.output_tokens,
        h.request_count,
        h.input_numer,
        h.output_numer,
        h.cached_numer,
        TRUNC((h.input_numer + h.output_numer + h.cached_numer) / 1000000000000)::bigint
      FROM hourly h
      ON CONFLICT (tenant, model_slug, hour)
      DO UPDATE SET
        input_tokens = EXCLUDED.input_tokens,
        cached_tokens = EXCLUDED.cached_tokens,
        output_tokens = EXCLUDED.output_tokens,
        request_count = EXCLUDED.request_count,
        input_numer = EXCLUDED.input_numer,
        output_numer = EXCLUDED.output_numer,
        cached_numer = EXCLUDED.cached_numer,
        charge_cents = EXCLUDED.charge_cents
      RETURNING tenant, hour
    )
    SELECT
      p.start_hour,
      p.end_hour,
      COUNT(u.hour)::bigint AS upserted_rows
    FROM params p
    LEFT JOIN upserted u ON TRUE
    GROUP BY p.start_hour, p.end_hour;

  verify-token-usage-hourly.sql: |
    \set ON_ERROR_STOP on

    -- Verification recomputes expected hourly token rows from TokenUsageEvent
    -- for the selected range and checks both completeness and exact values.
    BEGIN;

    CREATE TEMP TABLE verify_token_usage_hourly_state ON COMMIT DROP AS
    WITH params AS (
      SELECT
        date_trunc('hour', :'start_hour'::timestamptz) AS start_hour,
        date_trunc('hour', :'end_hour'::timestamptz) AS end_hour
    ),
    expected AS (
      SELECT
        e.caller_tenant AS tenant,
        e.model_slug,
        date_trunc('hour', e.ts) AS hour,
        -- Usage truth: input_tokens is the raw prompt-token total, independent
        -- of pricing (see docs/token-usage-hourly-prompt-token-proposal.md).
        SUM(e.prompt_tokens)::bigint AS expected_input_tokens,
        SUM(e.cached_tokens)::bigint AS expected_cached_tokens,
        SUM(e.completion_tokens)::bigint AS expected_output_tokens,
        COUNT(*)::bigint AS expected_request_count,
        -- Billing basis stays rate-aware: mirror token-hourly-aggregate.sql,
        -- where a cached rate of 0 bills the full prompt as input.
        COALESCE(SUM(
          CASE
            WHEN r.microcents_per_million_cached = 0
              THEN e.prompt_tokens
            ELSE GREATEST(e.prompt_tokens - e.cached_tokens, 0::bigint)
          END * r.microcents_per_million_input::numeric
        ), 0) AS expected_input_numer,
        COALESCE(SUM(
          e.completion_tokens::numeric * r.microcents_per_million_output
        ), 0) AS expected_output_numer,
        COALESCE(SUM(
          e.cached_tokens::numeric * r.microcents_per_million_cached
        ), 0) AS expected_cached_numer
      FROM TokenUsageEvent e
      JOIN params p ON TRUE
      CROSS JOIN LATERAL GetTokenRateMicrocents(e.model_slug, e.ts, e.caller_tenant) r
      WHERE e.ts >= p.start_hour
        AND e.ts < p.end_hour
      GROUP BY e.caller_tenant, e.model_slug, date_trunc('hour', e.ts)
    ),
    actual AS (
      SELECT
        h.tenant,
        h.model_slug,
        h.hour,
        h.input_tokens,
        h.cached_tokens,
        h.output_tokens,
        h.request_count,
        h.input_numer,
        h.output_numer,
        h.cached_numer,
        h.charge_cents
      FROM TokenUsageHourly h
      JOIN params p ON TRUE
      WHERE h.hour >= p.start_hour
        AND h.hour < p.end_hour
    )
    SELECT
      COALESCE(a.tenant, e.tenant) AS tenant,
      COALESCE(a.model_slug, e.model_slug) AS model_slug,
      COALESCE(a.hour, e.hour) AS hour,
      a.input_tokens,
      a.cached_tokens,
      a.output_tokens,
      a.request_count,
      a.input_numer,
      a.output_numer,
      a.cached_numer,
      a.charge_cents,
      e.expected_input_tokens,
      e.expected_cached_tokens,
      e.expected_output_tokens,
      e.expected_request_count,
      e.expected_input_numer,
      e.expected_output_numer,
      e.expected_cached_numer,
      a.tenant IS NULL AS missing_actual_row,
      e.tenant IS NULL AS unexpected_actual_row,
      a.charge_cents IS DISTINCT FROM TRUNC((a.input_numer + a.output_numer + a.cached_numer) / 1000000000000)::bigint AS charge_cents_self_mismatch,
      a.input_tokens IS DISTINCT FROM e.expected_input_tokens AS input_tokens_mismatch,
      a.cached_tokens IS DISTINCT FROM e.expected_cached_tokens AS cached_tokens_mismatch,
      a.output_tokens IS DISTINCT FROM e.expected_output_tokens AS output_tokens_mismatch,
      a.request_count IS DISTINCT FROM e.expected_request_count AS request_count_mismatch,
      a.input_numer IS DISTINCT FROM e.expected_input_numer AS input_numer_mismatch,
      a.output_numer IS DISTINCT FROM e.expected_output_numer AS output_numer_mismatch,
      a.cached_numer IS DISTINCT FROM e.expected_cached_numer AS cached_numer_mismatch
    FROM actual a
    FULL OUTER JOIN expected e
      ON e.tenant = a.tenant
     AND e.model_slug = a.model_slug
     AND e.hour = a.hour
    WHERE a.tenant IS NULL
       OR e.tenant IS NULL
       OR a.charge_cents IS DISTINCT FROM TRUNC((a.input_numer + a.output_numer + a.cached_numer) / 1000000000000)::bigint
       OR a.input_tokens IS DISTINCT FROM e.expected_input_tokens
       OR a.cached_tokens IS DISTINCT FROM e.expected_cached_tokens
       OR a.output_tokens IS DISTINCT FROM e.expected_output_tokens
       OR a.request_count IS DISTINCT FROM e.expected_request_count
       OR a.input_numer IS DISTINCT FROM e.expected_input_numer
       OR a.output_numer IS DISTINCT FROM e.expected_output_numer
       OR a.cached_numer IS DISTINCT FROM e.expected_cached_numer;

    SELECT *
    FROM verify_token_usage_hourly_state
    ORDER BY tenant, model_slug, hour
    LIMIT 50;

    CREATE TEMP TABLE verify_token_usage_hourly_counts ON COMMIT DROP AS
    SELECT
      COUNT(*) FILTER (WHERE missing_actual_row) AS missing_actual_row_count,
      COUNT(*) FILTER (WHERE unexpected_actual_row) AS unexpected_actual_row_count,
      COUNT(*) FILTER (WHERE charge_cents_self_mismatch) AS charge_cents_self_mismatch_count,
      COUNT(*) FILTER (
        WHERE input_tokens_mismatch
           OR cached_tokens_mismatch
           OR output_tokens_mismatch
           OR request_count_mismatch
           OR input_numer_mismatch
           OR output_numer_mismatch
           OR cached_numer_mismatch
      ) AS exact_value_mismatch_count
    FROM verify_token_usage_hourly_state;

    SELECT
      missing_actual_row_count,
      unexpected_actual_row_count,
      charge_cents_self_mismatch_count,
      exact_value_mismatch_count
    FROM verify_token_usage_hourly_counts;

    SELECT 1 / CASE
      WHEN missing_actual_row_count
         + unexpected_actual_row_count
         + charge_cents_self_mismatch_count
         + exact_value_mismatch_count = 0 THEN 1
      ELSE 0
    END AS verification_passed
    FROM verify_token_usage_hourly_counts;

    COMMIT;

  # Alert query: unprocessed token events with no active rate at their ts. These
  # are a should-never-happen misconfiguration; they stay unbilled and self-heal
  # once a rate is added. A non-zero count should page ops.
  token-no-rate-alert.sql: |
    SELECT
      e.model_slug,
      COUNT(*)::bigint AS unpriced_events,
      MIN(e.ts) AS oldest_ts
    FROM TokenUsageEvent e
    WHERE e.processed_at IS NULL
      AND NOT EXISTS (
        SELECT 1 FROM GetTokenRateMicrocents(e.model_slug, e.ts, e.caller_tenant)
      )
    GROUP BY e.model_slug
    ORDER BY unpriced_events DESC;

  tick-cleanup.sql: |
    -- Delete tick records older than 7 days
    -- Keep raw data for 7 days, then rely on hourly aggregates
    DELETE FROM UsageTick
    WHERE tick_time < NOW() - INTERVAL '7 days';

    -- Log deleted count (for monitoring)
    SELECT 'Deleted ticks older than 7 days' as action,
           (SELECT COUNT(*) FROM UsageTick WHERE tick_time < NOW() - INTERVAL '7 days') as count;
