apiVersion: batch/v1
kind: Job
metadata:
  name: billing-tenant-quota-verify
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: tenant-quota-verify
          image: inferx/inferx_util:v0.1.0
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              echo "Verifying current TenantQuota against processed UsageTick rows"
              psql -v ON_ERROR_STOP=1 -f /scripts/verify-tenant-quota-live.sql
          env:
            - name: PGHOST
              value: billingdb
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              value: billing_user
            - name: PGPASSWORD
              value: "123456"
            - name: PGDATABASE
              value: billingdb
          volumeMounts:
            - name: sql-scripts
              mountPath: /scripts
      volumes:
        - name: sql-scripts
          configMap:
            name: billing-sql-scripts
