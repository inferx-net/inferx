apiVersion: apps/v1
kind: Deployment
metadata:
  name: inferx-dashboard
  labels:
    app: inferx-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inferx-dashboard
  template:
    metadata:
      labels:
        app: inferx-dashboard
    spec:
      nodeSelector:
        inferx_storage: data  
      containers:
        - name: inferx-dashboard
          image: inferx/inferx_dashboard:${VERSION}
          imagePullPolicy: IfNotPresent
          env:
            - name: KEYCLOAK_URL
              value: "http://keycloak:8080/authn"
            - name: KEYCLOAK_REALM_NAME
              value: "inferx"
            - name: KEYCLOAK_CLIENT_ID
              value: "infer_client"
            - name: KEYCLOAK_CLIENT_SECRET
              value: "Nv0cPI1cAedpWYeEkZNL8PYqGrzIEOE7"
            - name: INFERX_APIGW_ADDR
              value: "http://gateway:4000"
            - name: DASHBOARD_GATEWAY_ALIGNED_ANONYMOUS_ACCESS
              value: "false"
            - name: SECRDB_ADDR
              value: "postgresql://secret:123456@secret-db:5432/secretdb"
          volumeMounts:
            - name: cert-volume
              mountPath: /etc/letsencrypt/
          livenessProbe:
            httpGet:
              path: /healthz
              port: 1250
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: cert-volume
          hostPath:
            path: /etc/letsencrypt/
---
apiVersion: v1
kind: Service
metadata:
  name: inferx-dashboard
spec:
  type: NodePort
  selector:
    app: inferx-dashboard
  ports:
    - name: http
      port: 1250
      targetPort: 1250
      nodePort: 31250  