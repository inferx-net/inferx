apiVersion: batch/v1
kind: Job
metadata:
  name: billing-hourly-backfill
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: hourly-backfill
          image: inferx/inferx_util:v0.1.0
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              : "${BACKFILL_START:?set BACKFILL_START, e.g. 2026-02-01T00:00:00Z}"
              : "${BACKFILL_END:?set BACKFILL_END, e.g. 2026-02-09T00:00:00Z}"
              if [ "${BACKFILL_START}" = "REPLACE_WITH_START_TIMESTAMP" ] || \
                 [ "${BACKFILL_END}" = "REPLACE_WITH_END_TIMESTAMP" ]; then
                echo "BACKFILL_START and BACKFILL_END must be replaced before applying this Job." >&2
                exit 1
              fi
              RANGE_INFO="$(psql -v ON_ERROR_STOP=1 -q -t -A -c "SELECT CASE WHEN date_trunc('hour', '${BACKFILL_START}'::timestamptz) < date_trunc('hour', '${BACKFILL_END}'::timestamptz) THEN 'ok' ELSE 'invalid' END || ',' || to_char(date_trunc('hour', '${BACKFILL_START}'::timestamptz) AT TIME ZONE 'UTC', 'YYYY-MM-DD\"T\"HH24:MI:SS\"Z\"') || ',' || to_char(date_trunc('hour', '${BACKFILL_END}'::timestamptz) AT TIME ZONE 'UTC', 'YYYY-MM-DD\"T\"HH24:MI:SS\"Z\"');")"
              RANGE_STATUS="$(printf '%s' "${RANGE_INFO}" | cut -d',' -f1)"
              START_HOUR="$(printf '%s' "${RANGE_INFO}" | cut -d',' -f2)"
              END_HOUR="$(printf '%s' "${RANGE_INFO}" | cut -d',' -f3)"
              if [ "${RANGE_STATUS}" != "ok" ]; then
                echo "BACKFILL_START must be earlier than BACKFILL_END after hour truncation." >&2
                exit 1
              fi
              echo "Running UsageHourlyByFunc numerator migration"
              psql -v ON_ERROR_STOP=1 -f /scripts/migrate-usage-hourly-by-func-numer.sql
              echo "Backfilling UsageHourlyByFunc from ${START_HOUR} to ${END_HOUR} (end exclusive)"
              psql \
                -v ON_ERROR_STOP=1 \
                -v start_hour="${START_HOUR}" \
                -v end_hour="${END_HOUR}" \
                -f /scripts/hourly-aggregate-by-func-range.sql
              echo "Verifying UsageHourlyByFunc numerators from ${START_HOUR} to ${END_HOUR} (end exclusive)"
              psql \
                -v ON_ERROR_STOP=1 \
                -v start_hour="${START_HOUR}" \
                -v end_hour="${END_HOUR}" \
                -f /scripts/verify-usage-hourly-by-func-numer.sql
          env:
            - name: PGHOST
              value: billingdb
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              value: billing_user
            - name: PGPASSWORD
              value: "123456"
            - name: PGDATABASE
              value: billingdb
            - name: BACKFILL_START
              # MUST be replaced before applying this Job.
              # Choose the UTC start timestamp for the hourly backfill range.
              # After hour truncation it must still be earlier than BACKFILL_END.
              value: "2026-03-11T05:00:00Z"
            - name: BACKFILL_END
              # MUST be replaced before applying this Job.
              # Choose the end-exclusive UTC timestamp for the same backfill range.
              value: "2026-04-08T00:00:00Z"
          volumeMounts:
            - name: sql-scripts
              mountPath: /scripts
      volumes:
        - name: sql-scripts
          configMap:
            name: billing-sql-scripts
