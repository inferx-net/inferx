<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Gateway - Session Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js?v=4.3.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js?v=3.0.6"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #16213e;
            padding: 16px 24px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 1.5rem;
            color: #e94560;
        }

        .session-info {
            font-size: 0.9rem;
            color: #888;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message-content {
            max-width: none;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.6;
            font-size: 0.95rem;
            overflow-x: auto;
        }

        .message.user .message-content {
            background: #0f3460;
        }

        .message.assistant .message-content {
            background: #16213e;
            white-space: normal;
        }

        /* Markdown styles */
        .message-content :where(h1, h2, h3, h4, h5, h6) {
            margin-top: 1em;
            margin-bottom: 0.5em;
            font-weight: 600;
            line-height: 1.25;
        }

        .message-content :where(h1) { font-size: 1.75em; }
        .message-content :where(h2) { font-size: 1.5em; }
        .message-content :where(h3) { font-size: 1.25em; }
        .message-content :where(h4) { font-size: 1em; }

        .message-content :where(p) {
            margin: 0.8em 0;
        }

        .message-content :where(code) {
            background: #0a0a15;
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.9em;
        }

        .message-content :where(pre) {
            background: #0a0a15;
            padding: 1em;
            border-radius: 8px;
            overflow-x: auto;
            margin: 0.8em 0;
        }

        .message-content :where(pre code) {
            background: none;
            padding: 0;
            font-size: 0.85em;
            line-height: 1.5;
        }

        .message-content :where(blockquote) {
            border-left: 3px solid #e94560;
            padding-left: 1em;
            margin: 0.8em 0;
            color: #888;
        }

        .message-content :where(ul, ol) {
            padding-left: 1.5em;
            margin: 0.8em 0;
        }

        .message-content :where(li) {
            margin: 0.3em 0;
        }

        .message-content :where(table) {
            border-collapse: collapse;
            width: 100%;
            margin: 0.8em 0;
        }

        .message-content :where(th, td) {
            border: 1px solid #0f3460;
            padding: 0.5em 0.8em;
            text-align: left;
        }

        .message-content :where(th) {
            background: #0f3460;
            font-weight: 600;
        }

        .message-content :where(a) {
            color: #e94560;
            text-decoration: none;
        }

        .message-content :where(a:hover) {
            text-decoration: underline;
        }

        .message-content :where(hr) {
            border: none;
            border-top: 1px solid #0f3460;
            margin: 1.5em 0;
        }

        .error {
            background: #4a1a1a;
            padding: 12px 16px;
            border-radius: 8px;
            color: #ff6b6b;
        }

        .input-container {
            padding: 24px;
            background: #16213e;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            background: #0a0a15;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 12px 16px;
            color: #eee;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            min-height: 48px;
            max-height: 200px;
            outline: none;
        }

        textarea:focus {
            border-color: #e94560;
        }

        button {
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #ff5e78;
        }

        button:disabled {
            background: #0f3460;
            cursor: not-allowed;
        }

        .thinking {
            color: #888;
            font-size: 0.85rem;
            margin-left: 16px;
            font-style: italic;
        }

        .message-content[style*="background: #1a3a2e"] {
            font-family: monospace;
            font-size: 0.9rem;
            padding: 8px 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Agent Gateway</h1>
        <div class="session-info" id="sessionInfo">No session</div>
    </div>
    
    <div class="chat-container" id="chatContainer">
        <div style="text-align: center; color: #888; margin-top: 50px;">
            <p>Start a conversation by sending a message below</p>
        </div>
    </div>
    
    <div class="input-container">
        <textarea id="messageInput" placeholder="Type your message..."></textarea>
        <button id="sendBtn">Send</button>
    </div>

    <script>
        // Use the ixshare gateway endpoint that we tested
        const API_BASE = "http://192.168.0.44:31501";
        let currentSessionId = "auto";  // Will be set on first message

        async function createNewSession() {
            // Auto-create session is now handled by the prompt endpoint
            // Just set a unique session ID for this chat
            currentSessionId = "session-" + Date.now();
            updateSessionInfo();
            clearChat();
            addMessage('assistant', 'New session started! How can I help you?');
        }

        function updateSessionInfo() {
            const info = document.getElementById('sessionInfo');
            if (currentSessionId) {
                info.textContent = `Session: ${currentSessionId.substring(0, 8)}...`;
            } else {
                info.textContent = 'No session';
            }
        }

        function clearChat() {
            const container = document.getElementById('chatContainer');
            container.innerHTML = '';
        }

        function addMessage(role, content) {
            const container = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;
            
            messageDiv.appendChild(contentDiv);
            container.appendChild(messageDiv);
            
            container.scrollTop = container.scrollHeight;
            
            return contentDiv;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const message = input.value.trim();
            
            if (!message) {
                return;
            }

            // Generate a new session ID if this is the first message
            if (!currentSessionId || currentSessionId === "auto") {
                currentSessionId = "session-" + Date.now();
                updateSessionInfo();
            }

            input.value = '';
            input.style.height = 'auto';
            sendBtn.disabled = true;

            // Add user message
            addMessage('user', message);

            // Add thinking indicator
            const container = document.getElementById('chatContainer');
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'thinking';
            thinkingDiv.textContent = 'Thinking...';
            container.appendChild(thinkingDiv);
            container.scrollTop = container.scrollHeight;

            try {
                const response = await fetch(`${API_BASE}/sessions/${currentSessionId}/prompt_stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, stream: true })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';
                
                // Create a new message div for streaming
                const messageDiv = document.createElement('div');
                messageDiv.className = `message assistant`;
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                messageDiv.appendChild(contentDiv);
                container.insertBefore(messageDiv, thinkingDiv);
                
                // Configure marked
                marked.setOptions({
                    async: false,
                    breaks: true,
                    gfm: true,
                    headerIds: false,
                    mangle: false
                });
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        
                        const dataStr = line.slice(6);
                        
                        if (dataStr.trim() === '' || dataStr.trim() === '[DONE]') continue;
                        if (line.trim().startsWith('event:')) continue;
                        
                        try {
                            const data = JSON.parse(dataStr);
                            
                            if (data.content !== undefined && data.content !== null) {
                                fullContent += data.content;
                                // Accumulate only - don't render during streaming
                            }
                        } catch (e) {
                            if (dataStr.trim()) {
                                fullContent += dataStr;
                            }
                        }
                    }
                }
                
                // Render ONLY after stream completes
                if (fullContent) {
                    try {
                        // HACK: The LLM in this environment sends text with ZERO newlines.
                        // We must inject newlines before markdown structures for marked to work.
                        // This is a workaround for broken LLM output.
                        let processed = fullContent
                            // Headers (##) at start of string
                            .replace(/^##/, '\n\n##')
                            // Headers (##) after any character
                            .replace(/([^#\n])##/g, '$1\n\n##')
                            // Bold headers followed by list items (**Title**- Item)
                            .replace(/\*\*([^*]+)\*\*(-)/g, '\n\n**$1**\n$2')
                            // List items (- or *) after non-list character
                            .replace(/([^\n-])([-*] )/g, '$1\n$2')
                            // Clean up excessive blank lines
                            .replace(/\n{3,}/g, '\n\n');
                        
                        marked.setOptions({
                            gfm: true,
                            breaks: true,
                            headerIds: false,
                            mangle: false
                        });
                        
                        const html = DOMPurify.sanitize(marked.parse(processed));
                        contentDiv.innerHTML = html;
                    } catch (e) {
                        console.error('Markdown render error:', e);
                        contentDiv.textContent = fullContent;
                    }
                }
                
                // Remove thinking indicator
                thinkingDiv.remove();

            } catch (error) {
                thinkingDiv.remove();
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error';
                errorDiv.textContent = 'Error: ' + error.message;
                container.appendChild(errorDiv);
                container.scrollTop = container.scrollHeight;
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        }

        // Wait for DOM to be fully loaded
        document.addEventListener('DOMContentLoaded', () => {
            // Event listeners
            document.getElementById('sendBtn').addEventListener('click', sendMessage);

            document.getElementById('messageInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Textarea auto-resize
            document.getElementById('messageInput').addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 200) + 'px';
            });

            // Auto-create session on load
            currentSessionId = "session-" + Date.now();
            updateSessionInfo();
            clearChat();
            addMessage('assistant', 'New session started! How can I help you?');
        });
    </script>
</body>
</html>
