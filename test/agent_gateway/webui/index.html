<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Gateway - Session Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #16213e;
            padding: 16px 24px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 1.5rem;
            color: #e94560;
        }

        .session-info {
            font-size: 0.9rem;
            color: #888;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message-content {
            max-width: none;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .message.user .message-content {
            background: #0f3460;
        }

        .message.assistant .message-content {
            background: #16213e;
            white-space: pre-wrap;
        }

        .error {
            background: #4a1a1a;
            padding: 12px 16px;
            border-radius: 8px;
            color: #ff6b6b;
        }

        .input-container {
            padding: 24px;
            background: #16213e;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            background: #0a0a15;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 12px 16px;
            color: #eee;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            min-height: 48px;
            max-height: 200px;
            outline: none;
        }

        textarea:focus {
            border-color: #e94560;
        }

        button {
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #ff5e78;
        }

        button:disabled {
            background: #0f3460;
            cursor: not-allowed;
        }

        .thinking {
            color: #888;
            font-size: 0.85rem;
            margin-left: 16px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Agent Gateway</h1>
        <div class="session-info" id="sessionInfo">No session</div>
    </div>
    
    <div class="chat-container" id="chatContainer">
        <div style="text-align: center; color: #888; margin-top: 50px;">
            <p>Start a conversation by sending a message below</p>
        </div>
    </div>
    
    <div class="input-container">
        <textarea id="messageInput" placeholder="Type your message..."></textarea>
        <button id="sendBtn">Send</button>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let currentSessionId = null;

        async function createNewSession() {
            const container = document.getElementById('chatContainer');
            try {
                const response = await fetch(`${API_BASE}/sessions`, { method: 'POST' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                currentSessionId = data.session.id;
                updateSessionInfo();
                clearChat();
                addMessage('assistant', 'New session started! How can I help you?');
            } catch (error) {
                console.error('Create session error:', error);
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error';
                errorDiv.textContent = 'Failed to create session: ' + error.message + '. Make sure the server is running at ' + API_BASE;
                container.appendChild(errorDiv);
                container.scrollTop = container.scrollHeight;
            }
        }

        function updateSessionInfo() {
            const info = document.getElementById('sessionInfo');
            if (currentSessionId) {
                info.textContent = `Session: ${currentSessionId.substring(0, 8)}...`;
            } else {
                info.textContent = 'No session';
            }
        }

        function clearChat() {
            const container = document.getElementById('chatContainer');
            container.innerHTML = '';
        }

        function addMessage(role, content) {
            const container = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;
            
            messageDiv.appendChild(contentDiv);
            container.appendChild(messageDiv);
            
            container.scrollTop = container.scrollHeight;
            
            return contentDiv;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const message = input.value.trim();
            
            if (!message || !currentSessionId) {
                if (!currentSessionId) {
                    await createNewSession();
                    if (!currentSessionId) return;
                } else {
                    return;
                }
            }

            input.value = '';
            input.style.height = 'auto';
            sendBtn.disabled = true;

            // Add user message
            addMessage('user', message);

            // Add thinking indicator
            const container = document.getElementById('chatContainer');
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'thinking';
            thinkingDiv.textContent = 'Thinking...';
            container.appendChild(thinkingDiv);
            container.scrollTop = container.scrollHeight;

            try {
                const response = await fetch(`${API_BASE}/sessions/${currentSessionId}/prompt_stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, stream: false })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                thinkingDiv.remove();

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]' || data.startsWith('{"message_id":')) continue;
                            fullContent += data + '\n';
                        }
                    }
                }

                // Render raw text with newlines converted to <br>
                const contentDiv = addMessage('assistant', '');
                contentDiv.innerHTML = fullContent.replace(/\n/g, '<br>');

            } catch (error) {
                thinkingDiv.remove();
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error';
                errorDiv.textContent = 'Error: ' + error.message;
                container.appendChild(errorDiv);
                container.scrollTop = container.scrollHeight;
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        }

        // Event listeners
        document.getElementById('sendBtn').addEventListener('click', sendMessage);

        document.getElementById('messageInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        // Auto-create session on load if needed
        window.addEventListener('load', async () => {
            await createNewSession();
        });
    </script>
</body>
</html>
